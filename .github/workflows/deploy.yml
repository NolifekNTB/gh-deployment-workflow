name: Github pages test

on:
 push:
   branches: ["main"]
 workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Deployment job
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
